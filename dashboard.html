<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ristoratore - Gestione Prenotazioni</title>
    <!-- Collegamento allo stile unico -->
    <link rel="stylesheet" href="gestionale-style.css">
    <style>
        /* Piccole sovrascritture specifiche per i widget affiancati della dashboard */
        .stats-bar { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--bg-card-slate); padding: 20px; border-radius: 12px; border: 1px solid rgba(139, 92, 246, 0.15); flex: 1; border-left: 5px solid #27c93f; }
        .stat-card h3 { font-size: 0.85rem; color: var(--text-gray); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card p { font-size: 1.8rem; font-weight: bold; color: var(--text-white); }
        .bottom-panels { display: flex; gap: 30px; margin-top: 40px; }
        .panel-box { background: var(--bg-card-slate); padding: 25px; border-radius: 12px; border: 1px solid rgba(139, 92, 246, 0.15); flex: 1; }
        .panel-box h3 { color: var(--text-white); margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid rgba(139, 92, 246, 0.1); padding-bottom: 8px; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .badge-attesa { background-color: rgba(255, 189, 46, 0.15); color: #ffbd2e; border: 1px solid #ffbd2e; }
        .badge-confermato { background-color: rgba(39, 201, 63, 0.15); color: #27c93f; border: 1px solid #27c93f; }
        .badge-rifiutato { background-color: rgba(255, 95, 86, 0.15); color: #ff5f56; border: 1px solid #ff5f56; }
        .no-data { text-align: center; padding: 40px; color: var(--text-gray); font-size: 1.1rem; }
        .btn-dash { background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); color: var(--text-white); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-dash:hover { background: var(--neon-violet); border-color: var(--neon-violet); }
        .btn-out { background: rgba(255, 95, 86, 0.1); border: 1px solid rgba(255, 95, 86, 0.3); color: #ff5f56; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-left: 10px; transition: all 0.3s; }
        .btn-out:hover { background: #ff5f56; color: white; }
        
        /* Stile specifico per il tasto audio muto/attivo */
        .btn-audio { background: rgba(39, 201, 63, 0.1); border: 1px solid rgba(39, 201, 63, 0.4); color: #27c93f; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-left: 10px; transition: all 0.3s; }
        .btn-audio.muted { background: rgba(255, 95, 86, 0.1); border: 1px solid rgba(255, 95, 86, 0.4); color: #ff5f56; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="dashboard-header">
        <div>
            <h1 id="nome-locale-titolo" class="text-gradient" style="font-size: 2.2rem;">Pannello Prenotazioni</h1>
            <p id="sottotitolo-locale" style="color: var(--text-gray); margin-top: 5px;">Caricamento informazioni locale...</p>
        </div>
        <div>
            <!-- Nuovo tasto per silenziare/attivare il suono delle notifiche -->
            <button id="btn-toggle-audio" class="btn-audio" onclick="toggleAudio()">🔊 Suono: ATTIVO</button>
            <button class="btn-dash" onclick="caricaPrenotazioni()">🔄 Aggiorna Lista</button>
            <button class="btn-out" onclick="logout()">🚪 Esci</button>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-card" style="border-left-color: var(--neon-violet);">
            <h3>Prenotazioni Totali</h3>
            <p id="count-totali">0</p>
        </div>
        <div class="stat-card" style="border-left-color: #ffbd2e;">
            <h3>In Attesa</h3>
            <p id="count-attesa">0</p>
        </div>
        <div class="stat-card" style="border-left-color: #27c93f;">
            <h3>Coperti Confermati</h3>
            <p id="count-confermati">0</p>
        </div>
    </div>

    <div style="margin-bottom: 25px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button onclick="filtraStato('tutte')" class="btn-dash" style="background: rgba(241, 237, 250, 0.05);">📋 Mostra Tutte</button>
        <button onclick="filtraStato('in attesa')" class="btn-dash" style="border-color: #ffbd2e; color: #ffbd2e;">⏳ Da Gestire</button>
        <button onclick="filtraStato('confermato')" class="btn-dash" style="border-color: #27c93f; color: #27c93f;">✅ Confermate</button>
        <button onclick="filtraStato('rifiutato')" class="btn-dash" style="border-color: #ff5f56; color: #ff5f56;">❌ Rifiutate</button>
    </div>

    <div class="table-responsive">
        <table class="digital-table">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Telefono</th>
                    <th>Data</th>
                    <th>Ora</th>
                    <th>Persone</th>
                    <th>Stato</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="tabella-corpo"></tbody>
        </table>
        <div id="messaggio-vuoto" class="no-data" style="display: none;">
            Nessuna prenotazione trouvata per questo locale.
        </div>
    </div>

    <div class="bottom-panels">
        <div class="panel-box">
            <h3>⚙️ Gestione Capienza Sala</h3>
            <label>Posti/Coperti Massimi Simultanei</label>
            <input type="number" id="input-tavoli" placeholder="Es. 30">
            <button id="btn-salva-capienza" class="btn-premium" style="margin-top: 10px;">Salva Impostazioni Sala 💾</button>
            <div id="msg-capienza" style="margin-top:8px; font-size:0.9rem; font-weight:bold;"></div>
        </div>

        <div class="panel-box" style="margin-top: 20px;">
            <h3>Cambia Email Aziendale</h3>
            
            <div id="div-step-email-1" style="margin-top: 15px;">
                <div class="form-group">
                    <label>Nuovo Indirizzo Email</label>
                    <input type="email" id="nuova-email-impostazioni" placeholder="nuovaemail@locale.it">
                </div>
                <button id="btn-richiedi-email" class="btn-premium" style="margin-top: 10px; width: 100%;">Invia Codice di Verifica</button>
            </div>

            <div id="div-step-email-2" style="display: none; margin-top: 15px;">
                <div class="form-group">
                    <label>Codice OTP ricevuto sulla nuova email</label>
                    <input type="text" id="codice-otp-email" placeholder="123456" maxlength="6" style="letter-spacing: 4px; text-align: center;">
                </div>
                <button id="btn-conferma-email" class="btn-premium" style="margin-top: 10px; width: 100%; background: linear-gradient(135deg, #10b981, #047857);">Conferma ed Aggiorna</button>
            </div>

            <div id="msg-email" style="margin-top: 10px; font-size: 0.9rem; font-weight: bold;"></div>
        </div>

        <div class="panel-box">
            <h3>🔒 Sicurezza Account</h3>
            <label>Nuova Password Account</label>
            <input type="password" id="nuova-password" placeholder="Minimo 6 caratteri">
            <button id="btn-salva-password" class="btn-premium" style="margin-top: 10px; background: var(--neon-violet); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);">Aggiorna Password 🔑</button>
            <div id="msg-password" style="margin-top:8px; font-size:0.9rem; font-weight:bold;"></div>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://gestionale-prenotazioni-backend.onrender.com";
    const ristoranteId = sessionStorage.getItem('ristoranteId');
    const nomeLocale = sessionStorage.getItem('nomeLocale');

    // --- VARIABILI GLOBALI PER REFRESH AUTOMATICO E SUONO ---
    let primoCaricamentoRiuscito = false;
    let IDMassimoPrenotazione = 0; // Tiene traccia dell'ID più alto inserito nel DB
    let audioSilenzioso = false;   // Stato del bottone Mute
    const suonoNotifica = new Audio('notification.mp3'); // Ricordati di caricare questo file nella cartella su Vercel!

    // Chiama questa funzione subito dopo aver recuperato il `ristoranteId` dal sessionStorage
    eseguiPuliziaAutomatica();

    if (!ristoranteId) {
        alert("Accesso negato. Effettua prima il login.");
        window.location.href = 'login.html';
    }

    // Esegui la pulizia automatica delle prenotazioni vecchie appena si apre la dashboard
    async function eseguiPuliziaAutomatica() {
        try {
            await fetch(`${BACKEND_URL}/api/prenotazioni/pulizia-automatica/${ristoranteId}`, {
                method: 'POST'
            });
            console.log("Sistema di pulizia automatica attivato: prenotazioni vecchie rimosse.");
        } catch (err) {
            console.error("Errore pulizia automatica:", err);
        }
    }

    document.getElementById('nome-locale-titolo').innerText = `Pannello ${nomeLocale}`;
    
    async function recuperaCapienzaIniziale() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/ristoratori/${ristoranteId}`);
            const data = await res.json();
            if (res.ok) {
                document.getElementById('input-tavoli').value = data.tavoli_totali;
                document.getElementById('sottotitolo-locale').innerText = `Configurazione attiva: massimo ${data.tavoli_totali} posti gestiti contemporaneamente.`;
            }
        } catch (err) { console.error(err); }
    }

    // FUNZIONE DI ATTIVAZIONE/DISATTIVAZIONE AUDIO (MUTE)
    function toggleAudio() {
        audioSilenzioso = !audioSilenzioso;
        const btn = document.getElementById('btn-toggle-audio');
        if (audioSilenzioso) {
            btn.innerText = "🔇 Suono: MUTO";
            btn.classList.add('muted');
        } else {
            btn.innerText = "🔊 Suono: ATTIVO";
            btn.classList.remove('muted');
        }
    }

    async function caricaPrenotazioni() {
        const corpoTabella = document.getElementById('tabella-corpo');
        const messaggioVuoto = document.getElementById('messaggio-vuoto');
        
        try {
            const response = await fetch(`${BACKEND_URL}/api/prenotazioni/${ristoranteId}`);
            const prenotazioni = await response.json();

            corpoTabella.innerHTML = '';

            let totali = 0, attesa = 0, confermati = 0;
            let maxIdRilevatoInQuestaChiamata = 0;

            if (prenotazioni.length === 0) {
                messaggioVuoto.style.display = 'block';
                aggiornaContatori(0, 0, 0);
                IDMassimoPrenotazione = 0;
                primoCaricamentoRiuscito = true;
                return;
            }

            messaggioVuoto.style.display = 'none';

            prenotazioni.forEach(p => {
                totali++;
                if (p.stato === 'in attesa') attesa++;
                if (p.stato === 'confermato') confermati += p.persone;

                // Trova l'ID più recente tra le prenotazioni
                if (p.id > maxIdRilevatoInQuestaChiamata) {
                    maxIdRilevatoInQuestaChiamata = p.id;
                }

                const riga = document.createElement('tr');
                const dataFormattata = p.data.split('-').reverse().join('/');
                const oraFormattata = p.ora.substring(0, 5);

                let classeBadge = 'badge-attesa';
                if (p.stato === 'confermato') classeBadge = 'badge-confermato';
                if (p.stato === 'rifiutato') classeBadge = 'badge-rifiutato';

                let bottoniAzione = '';
                if (p.stato === 'in attesa') {
                    bottoniAzione = `
                        <button onclick="cambiaStato(${p.id}, 'confermato')" style="background:#27c93f; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:bold; margin-right:5px;">Accetta</button>
                        <button onclick="cambiaStato(${p.id}, 'rifiutato')" style="background:#ff5f56; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:bold; margin-right:5px;">Rifiuta</button>
                    `;
                } else {
                    bottoniAzione = `<span style="color:var(--text-gray); font-size:0.9rem; margin-right:10px; font-weight:500;">Gestita</span>`;
                }

                bottoniAzione += `
                    <button onclick="eliminaPrenotazioneManual(${p.id})" style="background:rgba(255, 95, 86, 0.15); color:#ff5f56; border:1px solid rgba(255, 95, 86, 0.4); padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:bold; transition:all 0.3s;" onmouseover="this.style.background='#ff5f56'; this.style.color='white';" onmouseout="this.style.background='rgba(255, 95, 86, 0.15)'; this.style.color='#ff5f56';">🗑️ Elimina</button>
                `;

                riga.innerHTML = `
                    <td style="font-weight: bold; color: var(--text-white);">${p.nome_cliente}</td>
                    <td>${p.telefono}</td>
                    <td>📅 ${dataFormattata}</td>
                    <td>🕒 ${oraFormattata}</td>
                    <td>👥 ${p.persone}</td>
                    <td><span class="badge ${classeBadge}">${p.stato}</span></td>
                    <td>${bottoniAzione}</td>
                `;
                corpoTabella.appendChild(riga);
            });

            aggiornaContatori(totali, attesa, confermati);

            // --- LOGICA DI CONTROLLO NOTIFICA SONORA ---
            // Se la dashboard era già avviata e l'ID massimo rilevato è maggiore di quello precedente, c'è una nuova prenotazione!
            if (primoCaricamentoRiuscito && maxIdRilevatoInQuestaChiamata > IDMassimoPrenotazione) {
                if (!audioSilenzioso) {
                    suonoNotifica.play().catch(err => console.log("Riproduzione bloccata dalle policy del browser, serve un'interazione utente sulla pagina.", err));
                }
            }

            // Aggiorniamo le variabili di stato per i prossimi controlli automatici
            IDMassimoPrenotazione = maxIdRilevatoInQuestaChiamata;
            primoCaricamentoRiuscito = true;

        } catch (error) {
            console.error('Errore durante il caricamento:', error);
        }
    }

    function aggiornaContatori(tot, att, conf) {
        document.getElementById('count-totali').innerText = tot;
        document.getElementById('count-attesa').innerText = att;
        document.getElementById('count-confermati').innerText = conf;
    }

    function filtraStato(statoScelto) {
        const righe = document.querySelectorAll('#tabella-corpo tr');
        righe.forEach(riga => {
            const testoRiga = riga.innerText.toLowerCase();
            if (statoScelto === 'tutte') {
                riga.style.display = '';
            } else if (statoScelto === 'in attesa' && testoRiga.includes('in attesa')) {
                riga.style.display = '';
            } else if (statoScelto === 'confermato' && testoRiga.includes('confermato')) {
                riga.style.display = '';
            } else if (statoScelto === 'rifiutato' && (testoRiga.includes('rifiutato') || testoRiga.includes('gestita'))) {
                riga.style.display = '';
            } else {
                riga.style.display = 'none';
            }
        });
    }

    async function cambiaStato(id, nuovoStato) {
        if (nuovoStato === 'rifiutato') {
            const confermaRifiuto = confirm(`⚠️ Attenzione!\nStai per rifiutare la prenotazione.\n\nRicordati di chiamare subito il cliente per avvisarlo ed evitare malintesi!`);
            if (!confermaRifiuto) return;
        }

        try {
            const response = await fetch(`${BACKEND_URL}/api/prenotazioni/${id}/stato`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nuovoStato })
            });

            if (response.ok) {
                alert(`Prenotazione impostata come: ${nuovoStato}`);
                caricaPrenotazioni();
            } else {
                alert('Impossibile aggiornare lo stato della prenotazione.');
            }
        } catch (error) {
            console.error('Errore durante l\'aggiornamento:', error);
            alert('Errore di connessione con il server.');
        }
    }

    document.getElementById('btn-salva-capienza').addEventListener('click', async () => {
        const tavoli = document.getElementById('input-tavoli').value;
        const divMsg = document.getElementById('msg-capienza');
        try {
            const res = await fetch(`${BACKEND_URL}/api/ristoratori/${ristoranteId}/capienza`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tavoli_totali: tavoli })
            });
            if (res.ok) {
                divMsg.style.color = "#27c93f";
                divMsg.innerText = "Capienza salvata con successo!";
                recuperaCapienzaIniziale();
            } else { divMsg.style.color = "#ff5f56"; divMsg.innerText = "Errore durante il salvataggio."; }
        } catch (err) { console.error(err); }
    });

    // STEP 1: RICHIESTA CODICE OTP PER NUOVA EMAIL
    document.getElementById('btn-richiedi-email').addEventListener('click', async () => {
        const emailInserita = document.getElementById('nuova-email-impostazioni').value.trim();
        const divMsg = document.getElementById('msg-email');
        
        if(!emailInserita || !emailInserita.includes('@')) {
            divMsg.style.color = "#ff5f56";
            divMsg.innerText = "Inserisci un'email valida.";
            return;
        }

        try {
            const res = await fetch(`${BACKEND_URL}/api/auth/richiedi-cambio-email`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ristoranteId, nuovaEmail: emailInserita })
            });
            const dati = await res.json();
            
            if (res.ok) {
                divMsg.style.color = "#27c93f";
                divMsg.innerText = dati.message;
                document.getElementById('div-step-email-1').style.display = 'none';
                document.getElementById('div-step-email-2').style.display = 'block';
            } else { 
                divMsg.style.color = "#ff5f56"; 
                divMsg.innerText = dati.error || "Errore durante l'invio del codice."; 
            }
        } catch (err) { 
            console.error(err); 
            divMsg.style.color = "#ff5f56";
            divMsg.innerText = "Impossibile collegarsi al server.";
        }
    });

    // STEP 2: CONFERMA CODICE E CAMBIO DEFINITIVO
    document.getElementById('btn-conferma-email').addEventListener('click', async () => {
        const codice = document.getElementById('codice-otp-email').value.trim();
        const divMsg = document.getElementById('msg-email');

        if(!codice) {
            divMsg.style.color = "#ff5f56";
            divMsg.innerText = "Inserisci il codice ricevuto.";
            return;
        }

        try {
            const res = await fetch(`${BACKEND_URL}/api/auth/conferma-cambio-email`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ristoranteId, codice })
            });
            const dati = await res.json();

            if (res.ok) {
                divMsg.style.color = "#27c93f";
                divMsg.innerText = "Email aggiornata con successo!";
                
                document.getElementById('codice-otp-email').value = '';
                document.getElementById('nuova-email-impostazioni').value = '';
                setTimeout(() => {
                    document.getElementById('div-step-email-2').style.display = 'none';
                    document.getElementById('div-step-email-1').style.display = 'block';
                    divMsg.innerText = '';
                }, 3000);
            } else {
                divMsg.style.color = "#ff5f56";
                divMsg.innerText = dati.error || "Codice errato.";
            }
        } catch (err) {
            console.error(err);
            divMsg.style.color = "#ff5f56";
            divMsg.innerText = "Errore di connessione.";
        }
    });

    async function eliminaPrenotazioneManual(idPrenotazione) {
        if (!confirm("⚠️ Attenzione!\nSei sicuro di voler eliminare definitivamente questa prenotazione dal database?\nL'azione non è reversibile.")) {
            return;
        }

        try {
            const res = await fetch(`${BACKEND_URL}/api/prenotazioni/${idPrenotazione}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                alert("Prenotazione eliminata con successo!");
                caricaPrenotazioni(); 
            } else {
                alert("Impossibile eliminare la prenotazione dal server.");
            }
        } catch (err) {
            console.error("Errore eliminazione:", err);
            alert("Errore di connessione con il server.");
        }
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = 'login.html';
    }

    window.addEventListener('DOMContentLoaded', () => {
        recuperaCapienzaIniziale();
        caricaPrenotazioni();

        // ABILITA IL REFRESH AUTOMATICO OGNI 30 SECONDI (30000 ms)
        setInterval(caricaPrenotazioni, 30000);
    });
</script>
</body>
</html>
