<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ristoratore - Gestione Prenotazioni</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; color: #333; padding: 30px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e0e0e0; padding-bottom: 15px; }
        h1 { color: #2c3e50; }
        .btn-refresh { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-refresh:hover { background-color: #2980b9; }
        
        /* Tabella */
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #eeeeee; }
        th { background-color: #2c3e50; color: white; font-weight: 600; }
        tr:hover { background-color: #f9fbfd; }
        
        /* Badge di Stato */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .badge-attesa { background-color: #f1c40f; color: #7f8c8d; }
        .badge-confermato { background-color: #2ecc71; color: white; }
        .badge-rifiutato { background-color: #e74c3c; color: white; }

        .no-data { text-align: center; padding: 40px; color: #7f8c8d; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Pannello Prenotazioni</h1>
            <p id="info-locale" style="color: #7f8c8d;">Caricamento locale...</p>
        </div>
        <button class="btn-refresh" onclick="caricaPrenotazioni()">🔄 Aggiorna Lista</button>
    </header>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Telefono</th>
                    <th>Data</th>
                    <th>Ora</th>
                    <th>Persone</th>
                    <th>Stato</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="tabella-corpo">
            </tbody>
        </table>
        <div id="messaggio-vuoto" class="no-data" style="display: none;">
            Nessuna prenotazione trovata per questo locale.
        </div>
    </div>
</div>

<script>
    async function caricaPrenotazioni() {
        const ristoranteId = sessionStorage.getItem('ristoranteId');
        const nomeLocale = sessionStorage.getItem('nomeLocale');

        if (!ristoranteId) {
            alert("Accesso negato. Effettua prima il login.");
            window.location.href = 'login.html';
            return;
        }
        
        // Mostra dinamicamente il nome del locale nel titolo
        if (nomeLocale) {
            document.getElementById('info-locale').innerText = `Ristorante: ${nomeLocale} (ID: ${ristoranteId})`;
        }
     
        const corpoTabella = document.getElementById('tabella-corpo');
        const messaggioVuoto = document.getElementById('messaggio-vuoto');
        
        try {
            // FIXATO: Rimosso "/stato" dalla fine, ora punta alla rotta corretta del backend
            const response = await fetch(`https://gestionale-prenotazioni-backend.onrender.com/api/prenotazioni/${ristoranteId}`);
            const prenotazioni = await response.json();

            corpoTabella.innerHTML = '';

            if (!prenotazioni || prenotazioni.length === 0) {
                messaggioVuoto.style.display = 'block';
                return;
            }

            messaggioVuoto.style.display = 'none';

            prenotazioni.forEach(p => {
                const riga = document.createElement('tr');
                
                const dataFormattata = p.data.split('-').reverse().join('/');
                const oraFormattata = p.ora.substring(0, 5);

                let classeBadge = 'badge-attesa';
                if (p.stato === 'confermato') classeBadge = 'badge-confermato';
                if (p.stato === 'rifiutato') classeBadge = 'badge-rifiutato';

                let bottoniAzione = '';
                if (p.stato === 'in attesa') {
                    bottoniAzione = `
                        <button onclick="cambiaStato(${p.id}, 'confermato')" style="background:#2ecc71; color:white; border:none; padding:5px 8px; border-radius:4px; cursor:pointer; font-weight:bold; margin-right:5px;">✅ Accetta</button>
                        <button onclick="cambiaStato(${p.id}, 'rifiutato')" style="background:#e74c3c; color:white; border:none; padding:5px 8px; border-radius:4px; cursor:pointer; font-weight:bold;">❌ Rifiuta</button>
                    `;
                } else {
                    bottoniAzione = `<span style="color:#95a5a6; font-size:0.9rem;">Gestita</span>`;
                }

                riga.innerHTML = `
                    <td style="font-weight: bold;">${p.nome_cliente}</td>
                    <td>${p.telefono}</td>
                    <td>📅 ${dataFormattata}</td>
                    <td>🕒 ${oraFormattata}</td>
                    <td>👥 ${p.persone}</td>
                    <td><span class="badge ${classeBadge}">${p.stato}</span></td>
                    <td>${bottoniAzione}</td>
                `;
                
                corpoTabella.appendChild(riga);
            });

        } catch (error) {
            console.error('Errore durante il caricamento:', error);
            alert('Impossibile caricare le prenotazioni.');
        }
    }

    // NUOVA FUNZIONE PER CAMBIARE STATO AL CLICK DEI BOTTONI
    async function cambiaStato(idPrenotazione, statoScelto) {
        try {
            // FIXATO: Sostituito localhost con l'endpoint reale di Render
            const response = await fetch(`https://gestionale-prenotazioni-backend.onrender.com/api/prenotazioni/${idPrenotazione}/stato`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nuovoStato: statoScelto })
            });

            if (response.ok) {
                caricaPrenotazioni(); // Ricarica la lista aggiornata al volo
            } else {
                alert("Impossibile aggiornare lo stato.");
            }
        } catch (error) {
            console.error('Errore di rete:', error);
        }
    }

    window.addEventListener('DOMContentLoaded', caricaPrenotazioni);
</script>

</body>
</html>
