<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenota un Tavolo</title>
    <!-- Collegamento allo stile unico -->
    <link rel="stylesheet" href="gestionale-style.css">
</head>
<body>

<div class="app-flex-center">
    <div class="digital-card">
        <h2 class="app-title"><span class="text-gradient">Prenota il tuo Tavolo 🍽️</span></h2>
        <form id="form-prenotazione">
            <div class="form-group">
                <label>Tuo Nome</label>
                <input type="text" id="nome_cliente" placeholder="Inserisci Nome e Cognome" required>
            </div>
            <div class="form-group">
                <label>Numero di Telefono</label>
                <input type="tel" id="telefono" placeholder="Es. 3331234567" required>
            </div>
            <div class="form-group">
                <label>Seleziona Giorno (Prossimi 7 giorni)</label>
                <select id="data-selezionata" required></select>
            </div>
            <div class="form-group">
                <label>Orario</label>
                <select id="ora" required>
                    <option value="19:30">19:30</option>
                    <option value="20:00">20:00</option>
                    <option value="20:30">20:30</option>
                    <option value="21:00">21:00</option>
                    <option value="21:30">21:30</option>
                </select>
            </div>
            <div class="form-group">
                <label>Numero di Persone</label>
                <select id="persone" required>
                    <option value="1">1 Persona</option>
                    <option value="2" selected>2 Persone</option>
                    <option value="3">3 Persone</option>
                    <option value="4">4 Persone</option>
                    <option value="5">5 Persone</option>
                    <option value="6">6 Persone</option>
                </select>
            </div>
            <button type="submit" class="btn-premium">Invia Prenotazione 🚀</button>
        </form>
        <div id="risposta-messaggio" class="status-msg"></div>
        
        <!-- Link di indicizzazione SEO -->
        <div class="powered-by-footer">
            <p>Powered by <a href="https://digitalstudiodev.it" target="_blank">Digital Studio</a> • Soluzioni Professionali</p>
        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const RISTORANTE_ID = urlParams.get('id');

if (!RISTORANTE_ID) {
    document.body.innerHTML = `
        <div style="text-align:center; margin-top:50px; font-family:sans-serif; color: #F1EDFA;">
            <h2>⚠️ Errore: Link di prenotazione non valido.</h2>
            <p style="color: #A49DB5; margin-top: 10px;">Manca l'identificativo del ristorante nell'URL.</p>
        </div>
    `;
}

function popolaGiorni() {
    const selectGiorni = document.getElementById('data-selezionata');
    const nomiGiorniIta = {
        'monday': 'Lunedì', 'tuesday': 'Martedì', 'wednesday': 'Mercoledì', 
        'thursday': 'Giovedì', 'friday': 'Venerdì', 'saturday': 'Sabato', 'sunday': 'Domenica'
    };

    for (let i = 0; i < 7; i++) {
        const dataOggetto = new Date();
        dataOggetto.setDate(dataOggetto.getDate() + i);

        let giornoSettimanaInEng = dataOggetto.toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
        let giornoIta = nomiGiorniIta[giornoSettimanaInEng];
        let infoGiorno = dataOggetto.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
        
        let testoVisivo = i === 0 ? `Oggi (${infoGiorno})` : i === 1 ? `Domani (${infoGiorno})` : `${giornoIta} ${infoGiorno}`;

        const anno = dataOggetto.getFullYear();
        const mese = String(dataOggetto.getMonth() + 1).padStart(2, '0');
        const giorno = String(dataOggetto.getDate()).padStart(2, '0');
        const valoreDb = `${anno}-${mese}-${giorno}`;

        const opzione = document.createElement('option');
        opzione.value = valoreDb;
        opzione.text = testoVisivo;
        selectGiorni.appendChild(opzione);
    }
}

document.getElementById('form-prenotazione').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const msgDiv = document.getElementById('risposta-messaggio');
    msgDiv.className = "status-msg"; // Reset classi temporanee
    
    const dati = {
        ristorante_id: parseInt(RISTORANTE_ID),
        nome_cliente: document.getElementById('nome_cliente').value,
        telefono: document.getElementById('telefono').value,
        data: document.getElementById('data-selezionata').value,
        ora: document.getElementById('ora').value,
        persone: document.getElementById('persone').value
    };

    try {
        const response = await fetch('https://gestionale-prenotazioni-backend.onrender.com/api/prenotazioni', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dati)
        });

        const risultato = await response.json();

        msgDiv.style.display = 'block';
        if (response.ok) {
            msgDiv.classList.add('success');
            msgDiv.innerText = "Prenotazione ricevuta! Attendi la conferma del locale.";
            document.getElementById('form-prenotazione').reset();
        } else {
            msgDiv.classList.add('error');
            msgDiv.innerText = risultato.error || "Errore durante la prenotazione.";
        }
    } catch (error) {
        msgDiv.style.display = 'block';
        msgDiv.classList.add('error');
        msgDiv.innerText = "Impossibile collegarsi al sistema.";
    }
});

window.addEventListener('DOMContentLoaded', popolaGiorni);
</script>
</body>
</html>
