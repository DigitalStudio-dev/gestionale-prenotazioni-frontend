<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Registra Nuovo Cliente</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .register-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-bottom: 20px; color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #7f8c8d; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
        .msg { text-align: center; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Registra Ristorante</h2>
    <form id="register-form">
        <div class="form-group">
    <label>Codice Autorizzazione Admin</label>
    <input type="password" id="codice-admin" placeholder="Inserisci il codice segreto sviluppatore" required>
</div>
<button type="submit">Crea Account Cliente ✅</button>
        <div class="form-group">
            <label>Email Aziendale</label>
            <input type="email" id="email" placeholder="nome@ristorante.com" required>
        </div>
        <div class="form-group">
            <label>Password Temporanea</label>
            <input type="password" id="password" placeholder="Inserisci password forte" required>
        </div>
        <button type="submit">Crea Account Cliente ✅</button>
    </form>
    <div id="messaggio" class="msg"></div>
</div>

<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nome_ristorante = document.getElementById('nome-ristorante').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const codiceAdmin = document.getElementById('codice-admin').value; // Prendiamo il codice
        const messaggioDiv = document.getElementById('messaggio');

        try {
            const response = await fetch('https://gestionale-prenotazioni-backend.onrender.com/api/auth/registrazione', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome_ristorante, email, password, codiceAdmin }) // Lo spediamo al backend
            });

            const data = await response.json();

            if (response.ok) {
                messaggioDiv.style.color = '#2ecc71';
                messaggioDiv.innerText = "Cliente registrato con successo!";
                document.getElementById('register-form').reset();
            } else {
                messaggioDiv.style.color = '#e74c3c';
                messaggioDiv.innerText = "Errore: " + data.error;
            }
        } catch (error) {
            messaggioDiv.style.color = '#e74c3c';
            messaggioDiv.innerText = "Impossibile connettersi al server.";
        }
    });
</script>

</body>
</html>
