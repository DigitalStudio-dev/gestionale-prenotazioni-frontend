<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Registra Nuovo Cliente</title>
    <!-- Collegamento allo stile unico -->
    <link rel="stylesheet" href="gestionale-style.css">
</head>
<body>

<div class="app-flex-center">
    <div class="digital-card">
        <h2 class="app-title"><span class="text-gradient">Registra Ristorante</span></h2>
        <form id="register-form">
            <div class="form-group">
                <label>Nome del Locale</label>
                <input type="text" id="nome-ristorante" placeholder="Es. Il Porticciolo" required>
            </div>
            <div class="form-group">
                <label>Email Aziendale</label>
                <input type="email" id="email" placeholder="nome@ristorante.com" required>
            </div>
            <div class="form-group">
                <label>Password Temporanea</label>
                <input type="password" id="password" placeholder="Inserisci password forte" required>
            </div>
            <div class="form-group">
                <label>Codice Autorizzazione Admin</label>
                <input type="password" id="codice-admin" placeholder="Inserisci il codice segreto" required>
            </div>
            <button type="submit" class="btn-premium">Crea Account Cliente ✅</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="login.html" style="color: var(--text-gray); text-decoration: none; font-weight: bold; font-size: 0.95rem; transition: color 0.3s;" onmouseover="this.style.color='var(--cyber-pink)'" onmouseout="this.style.color='var(--text-gray)'">← Torna al Login</a>
        </div>
        <div id="messaggio" class="status-msg"></div>
    </div>
</div>

<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nome_ristorante = document.getElementById('nome-ristorante').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const codiceAdmin = document.getElementById('codice-admin').value;
        const messaggioDiv = document.getElementById('messaggio');
        messaggioDiv.className = "status-msg";

        try {
            const response = await fetch('https://gestionale-prenotazioni-backend.onrender.com/api/auth/registrazione', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome_ristorante, email, password, codiceAdmin })
            });

            const data = await response.json();

            if (response.ok) {
                messaggioDiv.classList.add('success');
                messaggioDiv.style.display = 'block';
                messaggioDiv.innerText = "Cliente registrato con successo!";
                document.getElementById('register-form').reset();
            } else {
                messaggioDiv.classList.add('error');
                messaggioDiv.style.display = 'block';
                messaggioDiv.innerText = "Errore: " + data.error;
            }
        } catch (error) {
            console.error('Errore:', error);
            messaggioDiv.classList.add('error');
            messaggioDiv.style.display = 'block';
            messaggioDiv.innerText = "Impossibile connettersi al server.";
        }
    });
</script>
</body>
</html>
