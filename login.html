<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Ristoratore - Gestionale</title>
    <!-- Collegamento allo stile unico -->
    <link rel="stylesheet" href="gestionale-style.css">
</head>
<body>

<div class="app-flex-center">
    <div class="digital-card">
    <h2 class="app-title"><span class="text-gradient">Accesso Ristoratori</span></h2>
    
    <form id="form-login" onsubmit="gestisciLogin(event)">
        <div class="form-group">
            <label>Email Aziendale</label>
            <input type="email" id="email" required placeholder="esempio@locale.it">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-premium">Accedi al Pannello</button>
        <div style="text-align: right; margin-top: 10px;">
            <a href="#" onclick="mostraReset(true)" style="color: var(--text-gray); font-size: 0.85rem; text-decoration: none;">Password dimenticata?</a>
        </div>
        <div id="errore" class="status-msg error"></div>
    </form>

    <div id="sezione-reset" style="display: none; margin-top: 15px; border-top: 1px solid rgba(139, 92, 246, 0.2); padding-top: 15px;">
        <h3 style="color: var(--text-white); font-size: 1.1rem; margin-bottom: 15px;">Ripristina Password</h3>
        
        <div id="step-richiesta">
            <div class="form-group">
                <label>Inserisci l'Email dell'account</label>
                <input type="email" id="email-reset" placeholder="esempio@locale.it">
            </div>
            <button type="button" onclick="richiediCodice()" class="btn-premium" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">Invia Codice OTP</button>
        </div>

        <div id="step-conferma" style="display: none; margin-top: 15px;">
            <div class="form-group">
                <label>Codice OTP (6 cifre)</label>
                <input type="text" id="codice-otp" placeholder="123456" maxlength="6" style="letter-spacing: 4px; text-align: center;">
            </div>
            <div class="form-group">
                <label>Nuova Password (min 6 car.)</label>
                <input type="password" id="nuova-pwd-reset" placeholder="••••••••">
            </div>
            <button type="button" onclick="confermaReset()" class="btn-premium" style="background: linear-gradient(135deg, #10b981, #047857);">Aggiorna Password</button>
        </div>

        <div id="msg-reset" class="status-msg" style="display:none; margin-top:10px; padding:10px; border-radius:6px; font-size:0.9rem;"></div>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="#" onclick="mostraReset(false)" style="color: #ef4444; font-size: 0.85rem; text-decoration: none;">Torna al Login</a>
        </div>
    </div>
    
    <div class="powered-by-footer">
        <p>Powered by <a href="https://digitalstudiodev.it" target="_blank">Digital Studio</a></p>
    </div>
</div>
</div>

<script>
    async function gestisciLogin(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const erroreDiv = document.getElementById('errore');

        erroreDiv.style.display = 'none';

        try {
            const response = await fetch('https://gestionale-prenotazioni-backend.onrender.com/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const dati = await response.json();

            if (response.ok) {
                sessionStorage.setItem('ristoranteId', dati.ristoranteId);
                sessionStorage.setItem('nomeLocale', dati.nomeLocale);
                window.location.href = 'dashboard.html';
            } else {
                erroreDiv.innerText = dati.error;
                erroreDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('Errore:', error);
            erroreDiv.innerText = 'Impossibile connettersi al server.';
            erroreDiv.style.display = 'block';
        }
    }

    const BACKEND_URL = 'https://gestionale-prenotazioni-backend.onrender.com';

function mostraReset(attiva) {
    document.getElementById('form-login').style.display = attiva ? 'none' : 'block';
    document.getElementById('sezione-reset').style.display = attiva ? 'block' : 'none';
    document.getElementById('msg-reset').style.display = 'none';
}

async function richiediCodice() {
    const email = document.getElementById('email-reset').value.trim();
    const msgDiv = document.getElementById('msg-reset');
    if(!email) return alert("Inserisci l'email!");

    try {
        const res = await fetch(`${BACKEND_URL}/api/auth/richiedi-reset`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const dati = await res.json();
        msgDiv.style.display = 'block';
        if(res.ok) {
            msgDiv.style.background = "rgba(16, 185, 129, 0.2)";
            msgDiv.style.color = "#10b981";
            msgDiv.innerText = dati.message;
            document.getElementById('step-richiesta').style.display = 'none';
            document.getElementById('step-conferma').style.display = 'block';
        } else {
            msgDiv.style.background = "rgba(239, 68, 68, 0.2)";
            msgDiv.style.color = "#ef4444";
            msgDiv.innerText = dati.error;
        }
    } catch(err) { console.error(err); }
}

async function confermaReset() {
    const email = document.getElementById('email-reset').value.trim();
    const codice = document.getElementById('codice-otp').value.trim();
    const nuovaPassword = document.getElementById('nuova-pwd-reset').value;
    const msgDiv = document.getElementById('msg-reset');

    try {
        const res = await fetch(`${BACKEND_URL}/api/auth/conferma-reset`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, codice, nuovaPassword })
        });
        const dati = await res.json();
        msgDiv.style.display = 'block';
        if(res.ok) {
            msgDiv.style.background = "rgba(16, 185, 129, 0.2)";
            msgDiv.style.color = "#10b981";
            msgDiv.innerText = dati.message;
            setTimeout(() => { mostraReset(false); }, 3000);
        } else {
            msgDiv.style.background = "rgba(239, 68, 68, 0.2)";
            msgDiv.style.color = "#ef4444";
            msgDiv.innerText = dati.error;
        }
    } catch(err) { console.error(err); }
}
</script>
</body>
</html>
