<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Ristoratore - Gestionale</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 15px; }
        button:hover { background-color: #27ae60; }
        .error-msg { color: #e74c3c; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Accesso Ristoratori</h2>
    <form id="form-login" onsubmit="gestisciLogin(event)">
        <div class="form-group">
            <label>Email Aziendale</label>
            <input type="email" id="email" required placeholder="esempio@locale.it">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit">Accedi al Pannello</button>
        <div id="errore" class="error-msg"></div>
    </form>
</div>

<script>
    async function gestisciLogin(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const erroreDiv = document.getElementById('errore');

        erroreDiv.style.display = 'none';

        try {
            const response = await fetch('https://gestionale-prenotazioni-backend.onrender.com/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const dati = await response.json();

            if (response.ok) {
                // SALVIAMO L'ID DEL RISTORANTE NELLA MEMORIA DEL BROWSER (SessionStorage)
                // Così la dashboard saprà chi si è loggato!
                sessionStorage.setItem('ristoranteId', dati.ristoranteId);
                sessionStorage.setItem('nomeLocale', dati.nomeLocale);

                // Reindirizziamo il ristoratore alla dashboard vera e propria
                window.location.href = 'dashboard.html';
            } else {
                erroreDiv.innerText = dati.error;
                erroreDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('Errore:', error);
            erroreDiv.innerText = 'Impossibile connettersi al server.';
            erroreDiv.style.display = 'block';
        }
    }
</script>

</body>
</html>
